<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Typing Effect</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: monospace;
  }

  .text {
    color: #ff4d6d;
    font-size: 30px;
    border-right: 3px solid #ff4d6d;
    white-space: nowrap;
    overflow: hidden;
  }
</style>
</head>
<body>

<div class="text" id="text"></div>

<script>
const texts = [
  "i love you",
  "im sorry",
  "makasi buat semuanya"
];

let i = 0;
let char = 0;
let currentText = "";
let isDeleting = false;

function type() {
  currentText = texts[i];

  if (!isDeleting) {
    document.getElementById("text").innerHTML =
      currentText.substring(0, char++);
    
    if (char > currentText.length) {
      isDeleting = true;
      setTimeout(type, 1200); // jeda sebelum ganti
      return;
    }
  } else {
    document.getElementById("text").innerHTML =
      currentText.substring(0, char--);

    if (char < 0) {
      isDeleting = false;
      i = (i + 1) % texts.length;
    }
  }

  setTimeout(type, isDeleting ? 50 : 100);
}

type();
</script>

</body>
</html>
