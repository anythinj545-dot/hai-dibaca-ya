<!DOCTYPE html>
<html>
<head>
  <title>Ilys</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding-top: 120px;
      background: linear-gradient(135deg, #ffeaa7, #a29bfe);
      color: #2d3436;
    }

    .box {
      max-width: 500px;
      margin: auto;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #2d3436;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    #ziaPage {
      display: none;
      color: white;
    }
  </style>
</head>
<body>

<!-- HALAMAN ILYS -->
<div class="box" id="ilysPage">
  <h1>Ilysssss 💖</h1>
  <p>aku mau bilang sesuatu...</p>
  <p>klik lanjut ya</p>
  <button onclick="next()">lanjut</button>
</div>

<!-- HALAMAN ZIA -->
<div class="box" id="ziaPage">
  <h1>Zia 💜</h1>
  <p>ini udah halaman terakhir</p>
</div>

<script>
function next() {
  document.getElementById("ilysPage").style.display = "none";
  document.getElementById("ziaPage").style.display = "block";
}
</script>

</body>
</html>
