<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffb6c1, #a0c4ff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* LOCK */
#lock {
    text-align: center;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    margin-left: 10px;
    cursor: pointer;
    background: white;
}

/* MAIN */
#main {
    display: none;
    text-align: center;
    color: white;
    max-width: 700px;
    padding: 20px;
    animation: fade 1.5s ease;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

h1 {
    font-size: 40px;
}

.cake {
    font-size: 60px;
    animation: float 2s infinite alternate;
}

@keyframes float {
    from {transform: translateY(0);}
    to {transform: translateY(-10px);}
}

/* typing text */
#text {
    margin-top: 20px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-line;
}

/* falling effect */
.fall {
    position: absolute;
    top: -10px;
    color: white;
    font-size: 14px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {transform: translateY(110vh);}
}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock">
    <h2>Masukkan Passcode</h2>
    <input type="password" id="code" placeholder="******">
    <button onclick="check()">Masuk</button>
    <p id="err"></p>
</div>

<!-- MAIN -->
<div id="main">

    <div class="cake">🎂</div>
    <h1>Happy Birthday</h1>
    <h2>SATRIA WIJAYA</h2>

    <div id="text"></div>

</div>

<!-- MUSIC (optional, kamu bisa ganti file sendiri) -->
<audio id="music" loop>
    <source src="" type="audio/mpeg">
</audio>

<script>
function check(){
    let code = document.getElementById("code").value;

    if(code === "072525"){
        document.getElementById("lock").style.display = "none";
        document.getElementById("main").style.display = "block";

        startTyping();
        startRain();

        document.getElementById("music").play();
    } else {
        document.getElementById("err").innerText = "Kode salah";
    }
}

/* typing effect */
let text = `sekalipun aku sakit.. aku gabakal berhenti ngerayain kamu, maaf ya kalo aku belum bisa kaya kamu ke aku, semoga apapun pilihan kamu itu yang terbaik buat kamu..

aku uda berani lepasin kamu jadi tolong ya sayang.. berubahlah jadi lebih baik dari kemarin, orang tua kamu percaya sama kamu, kamu jangan kecewain mereka lagi, semuanya uda diusahain buat kamu tolong jaga pergaulan jangan merusak masa depanmu

pulang ke aku kalo dunia kamu berat, aku gabisa benci sama kamu sekalipun kamu jalan sama perempuan itu.., aku sadar aku mungkin pantes dapet semua itu, maaf buat rasa sakit yang bikin kamu jadi ngelakuin itu, be happy

selamat ulang tahun ya, kalo gabisa berubah buat aku.. berubahlah buat masa depan kamu, orang tua kamu, dan perempuan yang bakal sama kamu nanti

maaf ya aku cuma kasi ini, aku takut kamu gasuka.. tolong jangan dibuang ya

see u, be happy 😢`;

function startTyping(){
    let i = 0;
    let el = document.getElementById("text");

    let interval = setInterval(() => {
        el.innerHTML += text[i];
        i++;
        if(i >= text.length){
            clearInterval(interval);
        }
    }, 20);
}

/* rain effect */
function startRain(){
    setInterval(() => {
        let drop = document.createElement("div");
        drop.classList.add("fall");
        drop.innerHTML = "💧";
        drop.style.left = Math.random() * window.innerWidth + "px";
        drop.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(drop);

        setTimeout(() => {
            drop.remove();
        }, 5000);
    }, 200);
}
</script>

</body>
</html>
