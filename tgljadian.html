
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: white;
        }
        .logo {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .g { color: #4285F4; }
        .o1 { color: #EA4335; }
        .o2 { color: #FBBC05; }
        .l { color: #34A853; }
        .e { color: #EA4335; }

        .search-container {
            text-align: center;
        }
        input[type="password"] {
            width: 320px;
            padding: 12px 20px;
            margin: 8px 0;
            border: 1px solid #dfe1e5;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
        }
        input[type="password"]:hover, input[type="password"]:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: rgba(223,225,229,0);
        }
        .buttons {
            margin-top: 20px;
        }
        button {
            background-color: #f8f9fa;
            border: 1px solid #f8f9fa;
            border-radius: 4px;
            color: #3c4043;
            font-size: 14px;
            margin: 11px 4px;
            padding: 0 16px;
            line-height: 27px;
            height: 36px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="logo">
        <span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="g">g</span><span class="l">l</span><span class="e">e</span>
    </div>

    <div class="search-container">
        <input type="password" id="passcode" placeholder="ak tau km gbkl tau codeny">
        <div class="buttons">
            <button onclick="checkPasscode()">Penelusuran Google</button>
            <button onclick="checkPasscode()">Saya Lagi Beruntung</button>
        </div>
    </div>

    <script>
        function checkPasscode() {
            var code = document.getElementById("passcode").value;
            // Passcode sudah diganti menjadi 0725
            if (code === "0725") {
                alert("Passcode Benar!");
                window.location.href = "surat.html"; 
            } else {
                alert("Yah, bener kan kamu nggak tau codenya :P");
            }
        }
    </script>

</body>
</html>
