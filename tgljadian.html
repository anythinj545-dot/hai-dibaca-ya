<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wait...</title>
    <style>
        body {
            background-color: #fce4ec; /* Pink sangat muda */
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #5d4037;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: center;
            border: 2px solid #bbdefb; /* List Biru muda */
        }
        h2 { font-size: 18px; margin-bottom: 20px; color: #f06292; }
        input {
            width: 80%;
            padding: 12px;
            border: 2px solid #e1f5fe;
            border-radius: 10px;
            text-align: center;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #90caf9; }
        button {
            margin-top: 15px;
            padding: 10px 25px;
            background-color: #bbdefb;
            border: none;
            border-radius: 10px;
            color: #1976d2;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #90caf9; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>hemz km pasti gtau kn pscdeny</h2>
        <input type="password" id="pin" placeholder="ak tau km gbkl tau codeny">
        <br>
        <button onclick="check()">Buka</button>
    </div>

    <script>
        function check() {
            var pin = document.getElementById("pin").value;
            if (pin === "072525") {
                window.location.href = "birthday.html";
            } else {
                alert("Yah, bener kan kamu nggak tau codenya :P");
            }
        }
    </script>
</body>
</html>
