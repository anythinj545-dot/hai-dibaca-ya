<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - tgljadian</title>
    <style>
        body {
            margin: 0;
            background-color: #202124;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 500px; }
        
        .logo { font-size: 60px; font-weight: bold; margin-bottom: 30px; }
        .g-blue { color: #4285F4; } .g-red { color: #EA4335; }
        .g-yellow { color: #FBBC05; } .g-green { color: #34A853; }

        input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #5f6368;
            background-color: #303134;
            color: white;
            font-size: 18px;
            outline: none;
            text-align: center;
            box-sizing: border-box;
        }

        /* Pesan Tersembunyi */
        #hiddenMessage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .glitch { font-size: 24px; color: #ffeb3b; text-shadow: 2px 2px #f44336; }
    </style>
</head>
<body>

    <div class="container" id="searchBox">
        <div class="logo">
            <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
        </div>
        <input type="tel" id="passcode" placeholder="0000" maxlength="4" autocomplete="off">
    </div>

    <div id="hiddenMessage">
        <h1 class="glitch">Happy Birthday, Satria Wijaya! 🎂</h1>
        <p>Menampilkan pesan romantis dan kenangan...</p>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJpbmZqZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4ZzR4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZAmS8mZfaWQ9MSZjdD1n/MDJ9IbxxvDUQM/giphy.gif" width="200">
    </div>

    <script>
        const input = document.getElementById('passcode');
        const searchBox = document.getElementById('searchBox');
        const hiddenMessage = document.getElementById('hiddenMessage');

        input.addEventListener('input', (e) => {
            if (e.target.value === '0725') {
                searchBox.style.display = 'none';
                hiddenMessage.style.display = 'flex';
                // Di sini kamu bisa menambahkan fungsi untuk memutar lagu otomatis
            }
        });
    </script>
</body>
</html>
