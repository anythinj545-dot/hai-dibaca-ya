<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#e9dfc8;

  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.08), transparent 45%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.06), transparent 50%),
    linear-gradient(120deg, rgba(0,0,0,0.05), transparent);

  font-family: Georgia, "Times New Roman", serif;
}

/* 📖 dibuat seperti halaman buku */
.book {
  width: 80%;
  max-width: 650px;
  color: #3a2f24;
  font-size: 18px;
  line-height: 2;
  text-align: left;   /* ini bikin turun kebawah, bukan melebar */
  padding: 20px;
}

/* tiap baris jadi seperti paragraf kecil */
.line {
  opacity: 0;
  transform: translateY(15px);
  animation: appear 1s forwards;
  margin-bottom: 14px; /* spasi antar paragraf */
}

@keyframes appear {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* efek gerak lebih halus */
.left { transform: translateX(-10px); }
.right { transform: translateX(10px); }
.up { transform: translateY(-8px); }
.down { transform: translateY(8px); }

                                            </style>
