<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>for you</title>

<style>
  body {
    margin: 0;
    background: #000;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 30px 20px;
    overflow: hidden;
  }

  /* START SCREEN */
  .start {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 999999;
    padding-top: 35vh;
    text-align: center;
  }

  .btn {
    padding: 12px 22px;
    margin: 10px;
    border-radius: 20px;
    font-size: 16px;
    border: none;
    cursor: pointer;
    position: relative;
    z-index: 9999999;
  }

  .lanjut {
    background: #a5c9ff;
    color: #000;
    font-weight: 600;
  }

  .gamau {
    background: transparent;
    color: #a5c9ff;
  }

  .msg {
    margin-top: 10px;
    font-size: 14px;
    color: #a5c9ff;
    display: none;
  }

  /* TEXT */
  .text, .bottom, .ttd {
    max-width: 260px;
    margin: auto;
    color: #a5c9ff;
    line-height: 1.9;
  }

  .text { font-size: 17px; font-weight: 700; min-height: 60px; }
  .bottom { margin-top: 25px; font-size: 16px; font-weight: 600; min-height: 80px; }
  .ttd { margin-top: 20px; font-size: 14px; opacity: 0.8; }

  /* VIDEO */
  .video-box {
    margin-top: 25px;
    border-radius: 14px;
    overflow: hidden;
    display: inline-block;
  }

  video {
    width: 280px;
    transform: scale(1.25);
  }

  /* END */
  .end {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: red;
    font-size: 38px;
    font-weight: bold;
    opacity: 0;
    transition: 1s ease;
    z-index: 99999;
  }

  .end.show {
    opacity: 1;
  }
</style>
</head>

<body>

<div class="start" id="startScreen">

  <h2 style="color:#a5c9ff;">for u ❤️‍🩹</h2>

  <button class="btn lanjut" onclick="mulai()">lanjut</button>
  <button class="btn gamau" onclick="gamau()">gamau lanjut</button>

  <div class="msg" id="msg">sih? bisane gmau lnjt!! 😡</div>

</div>

<div class="text" id="textAtas"></div>

<div class="video-box">
  <!-- 🔥 FIX AUDIO AUTOPLAY -->
  <video id="vid" playsinline autoplay preload="auto">
    <source src="https://raw.githubusercontent.com/anythinj545-dot/hai-dibaca-ya/main/IMG_3936.MOV">
  </video>
</div>

<div class="bottom" id="textBawah"></div>
<div class="ttd" id="ttd"></div>

<div class="end" id="end">END</div>

<script>
const atas = "makasii ya ia , makasi buat semuanya, aku kira kitaa bakal bareng bareng selamanya, sampe akhirnya kita bener bener ga bisa bareng lagi.";
const bawah = "makasi buat semuanya ya sat..\n\naku bikin ini bukan tanpa alasan, aku cuma pengen kamu tau aku bener bener menghargai semuanya..";
const ttd = "to satria\nby zia";

const start = document.getElementById("startScreen");
const video = document.getElementById("vid");
const end = document.getElementById("end");

function ketik(el, text, speed=38, cb){
  let i = 0;
  el.innerHTML = "";

  function run(){
    if(i < text.length){
      el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
      i++;
      setTimeout(run, speed);
    } else if(cb) cb();
  }
  run();
}

function mulai(){
  start.style.display = "none";

  /* 🔥 FIX AUDIO PALING PENTING */
  video.muted = false;
  video.volume = 1;

  video.play().catch(() => {
    video.muted = false;
    video.play();
  });

  ketik(document.getElementById("textAtas"), atas, 38, () => {
    setTimeout(() => {

      ketik(document.getElementById("textBawah"), bawah, 38, () => {
        setTimeout(() => {

          ketik(document.getElementById("ttd"), ttd, 40, () => {
            setTimeout(cinematicEnd, 3500);
          });

        }, 500);
      });

    }, 500);
  });
}

function cinematicEnd(){
  document.getElementById("textAtas").style.opacity = 0;
  document.getElementById("textBawah").style.opacity = 0;
  document.getElementById("ttd").style.opacity = 0;
  document.querySelector(".video-box").style.opacity = 0;

  setTimeout(() => {
    end.classList.add("show");
  }, 1500);
}

function gamau(){
  document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
