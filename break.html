<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>for you</title>

<style>
  body {
    margin: 0;
    background: #000;
    font-family: sans-serif;
    text-align: center;
    padding: 30px 20px;
    overflow: hidden;
  }

  .start {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 999999;
    padding-top: 35vh;
  }

  .btn {
    padding: 12px 22px;
    margin: 10px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
  }

  .lanjut { background: #a5c9ff; color: #000; }
  .gamau { background: transparent; color: #a5c9ff; }

  .msg {
    color: #a5c9ff;
    display: none;
    margin-top: 10px;
  }

  .text, .bottom, .ttd {
    max-width: 260px;
    margin: auto;
    color: #a5c9ff;
    line-height: 1.8;
  }

  .video-box {
    margin-top: 20px;
  }

  video {
    width: 280px;
    border-radius: 10px;
  }

  .end {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: red;
    opacity: 0;
    transition: 1s;
  }

  .end.show { opacity: 1; }
</style>
</head>

<body>

<div class="start" id="startScreen">

  <h2 style="color:#a5c9ff;">for u ❤️‍🩹</h2>

  <button class="btn lanjut" onclick="mulai()">lanjut</button>
  <button class="btn gamau" onclick="gamau()">gamau lanjut</button>

  <div class="msg" id="msg">yaudah 😡</div>

</div>

<div class="text" id="textAtas"></div>

<div class="video-box">
  <video id="vid" playsinline preload="auto">
    <source src="https://raw.githubusercontent.com/anythinj545-dot/hai-dibaca-ya/main/IMG_3936.MOV">
  </video>
</div>

<div class="bottom" id="textBawah"></div>
<div class="ttd" id="ttd"></div>

<div class="end" id="end">END</div>

<script>

const atas = "makasii ya ia, makasi buat semuanya...";
const bawah = "aku bikin ini bukan tanpa alasan...";
const ttd = "to satria\nby zia";

const start = document.getElementById("startScreen");
const video = document.getElementById("vid");
const end = document.getElementById("end");

function ketik(el, text, speed=35, cb){
  let i = 0;
  el.innerHTML = "";

  function run(){
    if(i < text.length){
      el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
      i++;
      setTimeout(run, speed);
    } else if(cb) cb();
  }
  run();
}

function mulai(){
  start.style.display = "none";

  // 🔥 FIX AUDIO PALING KUAT
  video.muted = false;
  video.volume = 1;

  const playPromise = video.play();

  if(playPromise !== undefined){
    playPromise.catch(() => {
      // fallback kalau diblok
      video.muted = false;
      setTimeout(() => {
        video.play();
      }, 300);
    });
  }

  ketik(document.getElementById("textAtas"), atas, 35, () => {
    setTimeout(() => {

      ketik(document.getElementById("textBawah"), bawah, 35, () => {
        setTimeout(() => {

          ketik(document.getElementById("ttd"), ttd, 40, () => {
            setTimeout(endScene, 3000);
          });

        }, 500);
      });

    }, 500);
  });
}

function endScene(){
  document.querySelector(".video-box").style.opacity = 0;
  document.getElementById("textAtas").style.opacity = 0;
  document.getElementById("textBawah").style.opacity = 0;
  document.getElementById("ttd").style.opacity = 0;

  setTimeout(() => {
    end.classList.add("show");
  }, 1200);
}

function gamau(){
  document.getElementById("msg").style.display = "block";
}

</script>

</body>
</html>
