<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Typing Aesthetic</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* efek kertas lecek */
  background: #f3efe7;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(0,0,0,0.05), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,0,0,0.04), transparent 45%),
    linear-gradient(120deg, rgba(0,0,0,0.03), transparent);
  
  font-family: "Georgia", serif;
}

.text {
  max-width: 70%;
  font-size: 18px;
  color: #3b3b3b;
  line-height: 1.6;
  text-align: center;

  border-right: 1.5px solid #3b3b3b;
  white-space: pre-wrap;
  overflow: hidden;
  padding: 10px;
}
</style>
</head>

<body>

<div class="text" id="text"></div>

<script>
const message =
"gapunya tujuan lain tapi karena aku masi disini semuanya aku usahakan, bukan untuk apa apa.. dan bukan untuk harapan apa apa, semoga jalan yang kamu pilih adalah jalan yang paling benar 💗";

let i = 0;
const speed = 45;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  }
}

typeWriter();
</script>

</body>
</html>
