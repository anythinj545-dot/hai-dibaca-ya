<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>for you</title>

<style>
  body {
    margin: 0;
    background: #f5efe6;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding: 30px 20px;
    overflow: hidden;
  }

  .text {
    max-width: 320px;
    margin: auto;
    color: #5c4a3d;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.8;
    min-height: 60px;
  }

  .video-box {
    margin-top: 25px;
    overflow: hidden;
    border-radius: 14px;
    display: inline-block;
  }

  video {
    width: 320px;
    transform: scale(1.2);
  }

  .bottom {
    margin-top: 25px;
    color: #5c4a3d;
    font-size: 15px;
    font-weight: 500;
    line-height: 1.8;
    min-height: 80px;
  }

  .ttd {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.8;
  }

  .fade-out {
    animation: hilang 2s forwards;
  }

  @keyframes hilang {
    0% {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
    }
    100% {
      opacity: 0;
      filter: blur(10px);
      transform: translateY(-40px);
    }
  }
</style>
</head>

<body>

<div class="text" id="textAtas"></div>

<div class="video-box">
  <video id="vid" controls playsinline>
    <source src="https://raw.githubusercontent.com/anythinj545-dot/hai-dibaca-ya/main/IMG_3936.MOV">
  </video>
</div>

<div class="bottom" id="textBawah"></div>

<div class="ttd" id="ttd"></div>

<script>
const atas = "makasii ya ia , makasi buat semuanya, aku kira kitaa bakal bareng bareng selamanya, sampe akhirnya kita bener bener ga bisa bareng lagi.";
const bawah = "makasi buat semuanya ya sat..\n\naku bikin semua ini bukan maksud apa apa, aku cuma excited banget sama ultah kamuu akuu seneng,\nselepas kamu disana gimana semoga kamu bisa menghargai usaha aku ini yaa , aku bikinnya berhari harii banget soalnya hemz..";
const ttd = "to satria\nby zia";

function ketik(el, text, speed=35, callback){
  let i = 0;
  function ngetik(){
    if(i < text.length){
      el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
      i++;
      setTimeout(ngetik, speed);
    } else if(callback){
      callback();
    }
  }
  ngetik();
}

// animasi teks
ketik(document.getElementById("textAtas"), atas, 35, () => {
  setTimeout(() => {
    ketik(document.getElementById("textBawah"), bawah, 35, () => {
      setTimeout(() => {
        ketik(document.getElementById("ttd"), ttd, 40);
      }, 500);
    });
  }, 500);
});

// efek akhir setelah video selesai
const video = document.getElementById("vid");
video.onended = () => {
  document.body.classList.add("fade-out");
};
</script>

</body>
</html>
