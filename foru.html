<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Satria</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa; /* Abu-abu sangat muda biar gak terlalu pink */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* Foto Kolase Kamu */
        .foto-satria {
            width: 100%;
            height: auto;
            border-radius: 12px; /* Melengkung dikit aja */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        /* Teks Ngetik - Pakai Montserrat biar tegas */
        .typing-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #2c3e50;
            display: inline-block;
            text-transform: lowercase; /* Biar aesthetic ala anak sekarang */
        }

        /* Kursor ngetik simpel */
        .cursor {
            font-weight: 400;
            color: #bdc3c7;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="IMG-20260405-WA0009.jpg" alt="Satria" class="foto-satria">

        <div>
            <span id="text" class="typing-text"></span><span class="cursor">_</span>
        </div>
    </div>

    <script>
        const textElement = document.getElementById("text");
        const message = "happy birthday satria"; 
        let i = 0;

        function typeEffect() {
            if (i < message.length) {
                textElement.innerHTML += message.charAt(i);
                i++;
                setTimeout(typeEffect, 120); 
            } else {
                // Kursor tetap ada tapi gak ngetik lagi (biar kaya terminal)
                setTimeout(() => {
                    document.querySelector(".cursor").style.display = "none";
                }, 2000);
            }
        }

        // Link otomatis ke file zia.html (Sesuai request kamu)
        // Pastikan file ini disimpan dengan nama zia.html
        window.onload = typeEffect;
    </script>

</body>
</html>
