<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Satria</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fcfcfc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* Pesan Biru Pastel */
        #pesan-biru {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            color: #A7C7E7;
            margin-bottom: 20px;
            min-height: 50px;
        }

        /* Tombol Link */
        #tombol-pintu {
            display: none; /* Muncul setelah ngetik selesai */
            opacity: 0;
            text-decoration: none;
            color: white;
            background-color: #A7C7E7;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.5s ease;
            cursor: pointer;
            border: none;
        }

        /* Konten Utama (Foto & HBD) */
        #konten-hbd {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .foto-satria {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .typing-hbd {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #444;
            text-transform: lowercase;
        }

        .cursor {
            color: #A7C7E7;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="tahap-awal">
            <div id="pesan-biru">
                <span id="text1"></span><span id="cursor1" class="cursor">|</span>
            </div>
            <button id="tombol-pintu" onclick="bukaPesan()">pencet ini yaa</button>
        </div>

        <div id="konten-hbd">
            <img src="IMG-20260405-WA0009.jpg" alt="Satria" class="foto-satria">
            <div>
                <span id="text2" class="typing-hbd"></span><span id="cursor2" class="cursor">_</span>
            </div>
        </div>
    </div>

    <script>
        const text1 = document.getElementById("text1");
        const text2 = document.getElementById("text2");
        const btn = document.getElementById("tombol-pintu");
        const tahapAwal = document.getElementById("tahap-awal");
        const kontenHbd = document.getElementById("konten-hbd");
        
        const pesan1 = "hai ada pesan buat satriaaa, iyaaa kamuuu sat";
        const pesan2 = "happy birthday satria";
        
        let i = 0;
        let j = 0;

        function mulaiNgetik1() {
            if (i < pesan1.length) {
                text1.innerHTML += pesan1.charAt(i);
                i++;
                setTimeout(mulaiNgetik1, 100);
            } else {
                // Munculkan tombol setelah ngetik selesai
                btn.style.display = "inline-block";
                setTimeout(() => { btn.style.opacity = 1; }, 100);
            }
        }

        function bukaPesan() {
            // Sembunyikan tombol
            btn.style.display = "none";
            // Tampilkan konten HBD
            kontenHbd.style.display = "block";
            setTimeout(() => {
                kontenHbd.style.opacity = 1;
                mulaiNgetik2();
            }, 100);
        }

        function mulaiNgetik2() {
            if (j < pesan2.length) {
                text2.innerHTML += pesan2.charAt(j);
                j++;
                setTimeout(mulaiNgetik2, 120);
            }
        }

        window.onload = mulaiNgetik1;
    </script>

</body>
</html>
