<!DOCTYPE html>
<html>
<head>
  <title>Hai kamu 💌</title>
  <style>
    body {
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      background: #ffffff;
      padding: 50px 20px;
    }

    a {
      display: block;
      margin: 20px;
      font-size: 18px;
      color: #7aa7ff;
      text-decoration: none;
      font-weight: 600;
      opacity: 0.4;
      pointer-events: none;
    }

    a.active {
      opacity: 1;
      pointer-events: auto;
    }

    .warning {
      color: #7aa7ff;
      font-size: 14px;
      margin-top: 20px;
      display: none;
    }

    .end {
      margin-top: 40px;
      display: none;
      color: #ff8fb1;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.8;
    }

    .wa-button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      background: #ff8fb1;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>

<body>

<!-- 🔵 BAGIAN AWAL -->
<div id="startSection">

  <a id="link1" class="active"
     href="https://anythinj545-dot.github.io/hai-dibaca-ya/Ilys.html?v=2">
    💌🎂 inii duluu yang di klik y 🎂💌
  </a>

  <a id="link2" href="#">
    💌 im sorry n makasi ya 💌
  </a>

  <a id="link3" href="#">
    end
  </a>

  <div class="warning" id="warn">
    kan uda dibilang satu satu jangan langsungg yang lain hemz..
  </div>

</div>

<!-- 🌸 ENDING -->
<div class="end" id="endText">
  HAPPY BIRTHDAY 🎂<br><br>
  makasi uda liat dari awal sampe akhir ya<br><br>

  <a class="wa-button" href="https://wa.me/6285642180294" target="_blank">
    contact me
  </a>

  <br><br>
  by zia to satria
</div>

<script>
let step = 1;

const startSection = document.getElementById("startSection");

const link1 = document.getElementById("link1");
const link2 = document.getElementById("link2");
const link3 = document.getElementById("link3");
const warn = document.getElementById("warn");
const endText = document.getElementById("endText");

// link 1
link1.onclick = () => {
  step = 2;
  link2.classList.add("active");
  link2.href = "https://anythinj545-dot.github.io/hai-dibaca-ya/Jia.html";
};

// link 2
link2.onclick = (e) => {
  if(step < 2){
    e.preventDefault();
    warn.style.display = "block";
  } else {
    step = 3;
    link3.classList.add("active");
    link3.href = "https://anythinj545-dot.github.io/hai-dibaca-ya/break.html";
  }
};

// link 3 → ending + HAPUS BAGIAN AWAL
link3.onclick = (e) => {
  if(step < 3){
    e.preventDefault();
    warn.style.display = "block";
  } else {
    setTimeout(() => {
      startSection.style.display = "none"; // 🔥 INI KUNCINYA
      endText.style.display = "block";
      window.scrollTo(0, 0);
    }, 500);
  }
};
</script>

</body>
</html>
