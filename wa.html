<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>for you 💙</title>

<style>
/* (SEMUA STYLE KAMU TETAP, AKU GA UBah) */

.wa-button {
  animation: heartbeat 1.2s infinite;
  position: relative;
  z-index: 99999;
  pointer-events: auto;
}

@keyframes heartbeat {
  0% { transform: scale(1); }
  25% { transform: scale(1.08); }
  40% { transform: scale(1); }
  60% { transform: scale(1.12); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- 🔐 PASSCODE -->
<div class="pass-box" id="passBox">
  <h3 style="color:#7aa7ff;">masukin passcode 💙</h3>
  <input id="code" placeholder="tangal lahir aja">
  <br>
  <button onclick="checkCode()">masuk</button>
  <div class="error" id="error">tgl lhr km st ms lupa,gsh pake spasi!</div>
</div>

<!-- 🔵 CONTENT -->
<div id="mainContent" class="hidden">

  <a id="link1" class="active"
     href="https://anythinj545-dot.github.io/hai-dibaca-ya/Ilys.html?v=2">
    💌🎂 inii duluu yang di klik y 🎂💌
  </a>

  <a id="link2" href="#">💌 link kedua ,im sorry n makasi ya 💌</a>

  <a id="link3" href="#">link terakhir,end</a>

  <div class="warning" id="warn">jangan loncat ya 😌</div>

</div>

<!-- 🌸 ENDING -->
<div class="end" id="endText">
  HAPPY BIRTHDAY 🎂<br><br>
  makasi uda liat dari awal sampe akhir ya<br><br>

  <a class="wa-button"
     href="https://wa.me/6285642180294"
     target="_blank">
    contact me
  </a>

  <br><br>
  by zia 
  to satria
</div>

<script>
// ✅ STEP + END DISIMPAN
let step = parseInt(localStorage.getItem("step")) || 1;

// 🔐 PASSCODE (pakai session biar ga ilang permanen)
function checkCode(){
  const code = document.getElementById("code").value;
  const error = document.getElementById("error");

  if(code === "9april"){
    sessionStorage.setItem("unlock", "true");

    document.getElementById("passBox").style.display = "none";
    document.getElementById("mainContent").classList.remove("hidden");
  } else {
    error.style.display = "block";
  }
}

const link1 = document.getElementById("link1");
const link2 = document.getElementById("link2");
const link3 = document.getElementById("link3");
const warn = document.getElementById("warn");
const endText = document.getElementById("endText");

// 🔁 LOAD
window.onload = () => {
  if(sessionStorage.getItem("unlock") === "true"){
    document.getElementById("passBox").style.display = "none";
    document.getElementById("mainContent").classList.remove("hidden");
  }

  // 🔓 restore link
  if(step >= 2){
    link2.classList.add("active");
    link2.href = "https://anythinj545-dot.github.io/hai-dibaca-ya/Jia.html";
  }

  if(step >= 3){
    link3.classList.add("active");
    link3.href = "https://anythinj545-dot.github.io/hai-dibaca-ya/break.html";
  }

  // 🔥 restore END
  if(localStorage.getItem("end") === "true"){
    endText.style.display = "block";
  }
};

// link 1
link1.onclick = () => {
  step = 2;
  localStorage.setItem("step", step);
};

// link 2
link2.onclick = (e) => {
  if(step < 2){
    e.preventDefault();
    warn.style.display = "block";
  } else {
    step = 3;
    localStorage.setItem("step", step);
  }
};

// link 3
link3.onclick = (e) => {
  if(step < 3){
    e.preventDefault();
    warn.style.display = "block";
  } else {
    localStorage.setItem("end", "true"); // 🔥 fix end

    setTimeout(() => {
      endText.style.display = "block";
      endText.scrollIntoView({ behavior: "smooth" });
    }, 500);
  }
};
</script>

</body>
</html>
